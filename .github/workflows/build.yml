name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Run tests
        run: cargo test

      - name: Build ARM (aarch64)
        run: cargo build --release --target aarch64-apple-darwin

      - name: Build x86_64
        run: cargo build --release --target x86_64-apple-darwin

      - name: Create universal binary
        run: |
          mkdir -p target/universal-apple-darwin/release
          lipo -create \
            target/aarch64-apple-darwin/release/textstep \
            target/x86_64-apple-darwin/release/textstep \
            -output target/universal-apple-darwin/release/textstep

      - name: Upload ARM binary
        uses: actions/upload-artifact@v4
        with:
          name: textstep-aarch64-apple-darwin
          path: target/aarch64-apple-darwin/release/textstep

      - name: Upload x86_64 binary
        uses: actions/upload-artifact@v4
        with:
          name: textstep-x86_64-apple-darwin
          path: target/x86_64-apple-darwin/release/textstep

      - name: Upload universal binary
        uses: actions/upload-artifact@v4
        with:
          name: textstep-universal-apple-darwin
          path: target/universal-apple-darwin/release/textstep

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Run tests
        run: cargo test

      - name: Build
        run: cargo build --release

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: textstep-x86_64-unknown-linux-gnu
          path: target/release/textstep

  create-release:
    needs: [build-macos, build-linux]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Check for create-release label on merged PR
        id: check-label
        uses: actions/github-script@v7
        with:
          script: |
            const { data: prs } = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
            });
            const hasLabel = prs.some(pr =>
              pr.labels.some(label => label.name === 'create-release')
            );
            core.setOutput('should-release', hasLabel.toString());

      - name: Get version from Cargo.toml
        if: steps.check-label.outputs.should-release == 'true'
        id: version
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        if: steps.check-label.outputs.should-release == 'true'
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        if: steps.check-label.outputs.should-release == 'true'
        run: |
          cd artifacts
          for dir in textstep-*/; do
            name="${dir%/}"
            chmod +x "$dir/textstep"
            tar czf "${name}.tar.gz" -C "$dir" textstep
          done

      - name: Create GitHub Release
        if: steps.check-label.outputs.should-release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: TextStep ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: artifacts/*.tar.gz

      - name: Update Homebrew formula
        if: steps.check-label.outputs.should-release == 'true'
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          MACOS_SHA=$(shasum -a 256 artifacts/textstep-universal-apple-darwin.tar.gz | cut -d' ' -f1)
          LINUX_SHA=$(shasum -a 256 artifacts/textstep-x86_64-unknown-linux-gnu.tar.gz | cut -d' ' -f1)

          git clone https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/illobo/homebrew-textstep.git /tmp/homebrew-tap
          cd /tmp/homebrew-tap

          # Update version
          sed -i "s/^  version \".*\"/  version \"${VERSION}\"/" Formula/textstep.rb

          # Update macOS SHA256 (first sha256 line)
          sed -i "0,/sha256 \"[a-f0-9]*\"/s/sha256 \"[a-f0-9]*\"/sha256 \"${MACOS_SHA}\"/" Formula/textstep.rb

          # Update Linux SHA256 (second sha256 line)
          sed -i ":a;N;\$!ba;s/\(sha256 \"[a-f0-9]*\".*\)sha256 \"[a-f0-9]*\"/\1sha256 \"${LINUX_SHA}\"/" Formula/textstep.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/textstep.rb
          git commit -m "Update textstep to v${VERSION}"
          git push
